<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style2.css">
    <title>Ma premier calculatrice</title>
</head>
<body>
    <div class="calculatrice">
        <div class="ecran"></div>
        <div class="touche">
            <button data-key="Escape" class="operateur1">C</button>
            <button data-key="46" class="operateur1">AC</button>
            <button data-key="(" class="bouton">(</button>
            <button data-key=")" class="bouton">)</button>
            <button data-key="7" class="bouton">7</button>
            <button data-key="8" class="bouton">8</button>
            <button data-key="9" class="bouton">9</button>
            <button data-key="/" class="operateur">÷</button>
            <button data-key="4" class="bouton">4</button>
            <button data-key="5" class="bouton">5</button>
            <button data-key="6" class="bouton">6</button>
            <button data-key="*" class="operateur">×</button>
            <button data-key="1" class="bouton">1</button>
            <button data-key="2" class="bouton">2</button>
            <button data-key="3" class="bouton">3</button>
            <button data-key="-" class="operateur">-</button>
            <button data-key="0" class="bouton">0</button>
            <button data-key="," class="bouton">,</button>
            <button data-key="+" class="operateur">+</button>
            <button data-key="13" class="operateur">=</button>
            <!-- <button data-key="" class="operateur1"></button> -->

        </div>
    </div>



<script src="cal.js"></script>
</body>
</html>
